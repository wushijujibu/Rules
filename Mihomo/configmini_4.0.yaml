# --- 路由规则 (Rules) ---
rules:
  # 私有网络直连
  - RULE-SET,private,直连
  - RULE-SET,private_ip,直连,no-resolve

  # 国内直连
  - RULE-SET,steam_cn,直连
  - RULE-SET,epicgames,直连
  - RULE-SET,nvidia_cn,直连
  - RULE-SET,microsoft_cn,直连
  - RULE-SET,cloudflare_cn,直连

  # 进程规则
  - RULE-SET,DownloadApps,下载专用 # 常见磁力下载软件
  - PROCESS-NAME,com.perol.pixez,Pixiv
  - PROCESS-NAME,com.perol.play.pixez,Pixiv

  # 广告拦截
  - RULE-SET,adblockmihomolite,广告拦截

  # 阻断 YouTube UDP 流量
  - AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,youtube)),REJECT

  # 代理规则（域名）
  - RULE-SET,captcha,人机验证
  - RULE-SET,ai,AI
  - RULE-SET,youtube,YouTube
  - RULE-SET,googlefcm,FCM
  - RULE-SET,google,Google
  - RULE-SET,github,GitHub
  - RULE-SET,microsoft,Microsoft
  - RULE-SET,apple,Apple
  - RULE-SET,telegram,Telegram
  - RULE-SET,cloudflare,Cloudflare
  - RULE-SET,pixiv,Pixiv
  - RULE-SET,steam,Steam
  - RULE-SET,twitter,Twitter
  - RULE-SET,instagram,Instagram
  - RULE-SET,spotify,Spotify
  - RULE-SET,tiktok,TikTok
  - RULE-SET,netflix,Netflix

  # 代理规则（IP）
  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,telegram_ip,Telegram,no-resolve
  - RULE-SET,twitter_ip,Twitter,no-resolve
  - RULE-SET,cloudflare_ip,Cloudflare,no-resolve
  - RULE-SET,netflix_ip,Netflix,no-resolve

  # 兜底规则
  - RULE-SET,gfw,默认代理
  - RULE-SET,cn,直连
  - DOMAIN-WILDCARD,*.cn,直连
  - RULE-SET,cn_ip,直连
  - MATCH,默认代理
