# --- 策略组 (Proxy Groups) ---

# 策略组通用配置
group_common_select:
  &group_common_select {
    type: select,
    interval: 600,
    timeout: 3000,
    url: 'https://g.cn/generate_204',
    lazy: false,
    max-failed-times: 3,
  }

group_common_auto:
  &group_common_auto {
    interval: 600,
    timeout: 3000,
    type: url-test,
    tolerance: 100,
    include-all: true,
    url: 'https://g.cn/generate_204',
    lazy: false,
    max-failed-times: 3,
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png',
    hidden: true,
  }

# 通用代理节点组
prox_common:
  &proxies {
    proxies: ['默认节点', '香港', '日本', '美国', '新加坡', '其他'],
  }

proxy-groups:
  - name: '默认节点'
    <<: *group_common_select
    proxies: ['香港', '新加坡', '日本', '美国', '其他']
    icon: 'https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Macat.png'

  # 地区分组
  - name: '香港'
    <<: *group_common_select
    include-all: true
    proxies: ['香港-自动选择']
    filter: '(?=.*(港|🇭🇰|HK|[Hh]ong\s*[Kk]ong))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'
  - name: '香港-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(港|🇭🇰|HK|[Hh]ong\s*[Kk]ong))'

  - name: '新加坡'
    <<: *group_common_select
    include-all: true
    proxies: ['新加坡-自动选择']
    filter: '(?=.*(新加坡|狮城|🇸🇬|SG|[Ss]ingapore))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'
  - name: '新加坡-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(新加坡|狮城|🇸🇬|SG|[Ss]ingapore))'

  - name: '日本'
    <<: *group_common_select
    include-all: true
    proxies: ['日本-自动选择']
    filter: '(?=.*(日本|🇯🇵|JP|[Jj]apan))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png'
  - name: '日本-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(日本|🇯🇵|JP|[Jj]apan))'

  - name: '美国'
    <<: *group_common_select
    include-all: true
    proxies: ['美国-自动选择']
    filter: '(?=.*(美|🇺🇸|US|[Aa]merica|[Uu]nited\s*[Ss]tates))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'
  - name: '美国-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(美|🇺🇸|US|[Aa]merica|[Uu]nited\s*[Ss]tates))'

  - name: '其他'
    <<: *group_common_select
    include-all: true
    exclude-filter: '(?i)港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|直连'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/World_Map.png'

  # 分流策略组
  - name: '国外AI'
    <<: [*group_common_select, *proxies]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png'

