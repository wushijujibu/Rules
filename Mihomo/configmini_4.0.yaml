# --- 锚点定义 (通用属性) ---
proxy_providers_common:
  &p {
    type: http,
    interval: 86400,
    proxy: DIRECT,
    health-check:
      {
        enable: true,
        url: https://g.cn/generate_204,
        interval: 600,
        lazy: false,
      },
  }

# 全局过滤节点
exclude:
  &exclude {
    exclude-filter: '群|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|选择|剩余|公益|发布|DIZTNA|通路|登录|禁止|定时|渠道|牢记|永久|余额|阁下|本站|刷新|导航|⚠️|@|Expire|http|com',
  }

# --- 基础全局配置 ---

allow-lan: true
ipv6: true
bind-address: '*'
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict
external-controller: '[::]:9090'
external-ui: ui
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'

profile:
  store-selected: true
  store-fake-ip: true

# --- 代理节点 ---
+proxies:
  - { name: '🇨🇳 直连（IPv4优先）', type: direct, ip-version: ipv4-prefer }
  - { name: '🇨🇳 直连（IPv6优先）', type: direct, ip-version: ipv6-prefer }
  - { name: '🇨🇳 直连（双栈）', type: direct }

chinaDNS:
  &chinaDNS ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']

dns:
  enable: true
  ipv6: false
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: 'fc00::/18'
  fake-ip-filter:
    - '+.cn'
    - 'rule-set:private'
    - 'rule-set:category_ntp'
    - 'rule-set:fakeip_filter'
    - 'rule-set:connectivity_check'
    - 'rule-set:cn'
    - 'rule-set:googlefcm'
    - 'rule-set:steam_cn'
    - 'rule-set:epicgames'
    - 'rule-set:nvidia_cn'
    - 'rule-set:microsoft_cn'
    - 'rule-set:cloudflare_cn'
  default-nameserver:
    - '223.5.5.5'
    - '119.29.29.29'
  nameserver:
    - '1.1.1.1'
    - '8.8.8.8'
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query#DIRECT'
  nameserver-policy:
    '*': 'system'
    '+.arpa': 'system'
    'connectivitycheck.platform.hicloud.com': *chinaDNS
    '+.cn': *chinaDNS
    'rule-set:private,cn,steam_cn,epicgames,nvidia_cn,cloudflare_cn,microsoft_cn,microsoft,googlefcm,apple,spotify': *chinaDNS

hosts:
  'services.googleapis.cn': ['services.googleapis.com']

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    TLS: { ports: [443, 8443] }
    QUIC: { ports: [443, 8443] }
  skip-domain:
    ['Mijia Cloud', '+.oray.com', '+.push.apple.com', 'cloudflare-ech.com']
  skip-dst-address: ['rule-set:telegram_ip']

ntp:
  enable: true
  write-to-system: false
  server: cn.ntp.org.cn

tun:
  enable: true
  stack: system
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack: ['udp://any:53', 'tcp://any:53']

