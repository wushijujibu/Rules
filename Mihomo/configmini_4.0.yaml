# --- 策略组 (Proxy Groups) ---

# 策略组通用配置
group_common_select:
  &group_common_select {
    type: select,
    interval: 600,
    timeout: 3000,
    url: 'https://g.cn/generate_204',
    lazy: true,
    max-failed-times: 3,
  }

group_common_auto:
  &group_common_auto {
    interval: 600,
    timeout: 3000,
    type: url-test,
    tolerance: 100,
    include-all: true,
    url: 'https://g.cn/generate_204',
    lazy: true,
    max-failed-times: 3,
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png',
    hidden: true,
  }

# 通用代理节点组
prox_common:
  &proxies {
    proxies:
      [
        '默认代理',
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '低倍率节点',
        '高倍率节点',
        '其他节点',
      ],
  }

# 定义分流策略组
proxy-groups:
  - name: '默认代理'
    <<: *group_common_select
    proxies:
      [
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '低倍率节点',
        '高倍率节点',
        '其他节点',
      ]
    icon: 'https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Macat.png'

  # 定义地区策略组
  - name: '香港'
    <<: *group_common_select
    include-all: true
    proxies: ['香港-自动选择']
    filter: '(?=.*(港|🇭🇰|HK|[Hh]ong\s*[Kk]ong))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'
  - name: '香港-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(港|🇭🇰|HK|[Hh]ong\s*[Kk]ong))'

  - name: '台湾省'
    <<: *group_common_select
    include-all: true
    proxies: ['台湾省-自动选择']
    filter: '(?=.*(台湾|🇹🇼|TW|[Tt]ai\s*[Ww]an))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png'
  - name: '台湾省-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(台湾|🇹🇼|TW|[Tt]ai\s*[Ww]an))'

  - name: '新加坡'
    <<: *group_common_select
    include-all: true
    proxies: ['新加坡-自动选择']
    filter: '(?=.*(新加坡|狮城|🇸🇬|SG|[Ss]ingapore))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'
  - name: '新加坡-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(新加坡|狮城|🇸🇬|SG|[Ss]ingapore))'

  - name: '日本'
    <<: *group_common_select
    include-all: true
    proxies: ['日本-自动选择']
    filter: '(?=.*(日本|🇯🇵|JP|[Jj]apan))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png'
  - name: '日本-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(日本|🇯🇵|JP|[Jj]apan))'

  - name: '美国'
    <<: *group_common_select
    include-all: true
    proxies: ['美国-自动选择']
    filter: '(?=.*(美|🇺🇸|US|[Aa]merica|[Uu]nited\s*[Ss]tates))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'
  - name: '美国-自动选择'
    <<: *group_common_auto
    filter: '(?=.*(美|🇺🇸|US|[Aa]merica|[Uu]nited\s*[Ss]tates))'

  - name: '低倍率节点'
    <<: *group_common_select
    include-all: true
    filter: '^(?!.*(?:剩|期|客户端|软件)).*(?:(?<!\d)0\.[0-5]|下载|低倍)'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png'

  - name: '高倍率节点'
    <<: *group_common_select
    include-all: true
    filter: '(?:[*×xX✕✖⨉]\s*(?:[2-9]\d*|[1-9]\d+)(?:\.\d+)?)|(?:(?<![\d.])(?:[2-9]\d*|[1-9]\d+)(?:\.\d+)?\s*(?:倍|[*×xX✕✖⨉]))'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Airport.png'

  - name: '其他节点'
    <<: *group_common_select
    include-all: true
    exclude-filter: '(?i)港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|台湾|TW|🇹🇼|直连'
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/World_Map.png'

  - name: 'AI'
    <<: [*group_common_select, *proxies]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png'

